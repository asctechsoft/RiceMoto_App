name: ricemoto
description: "RiceMoto - smart receipt & expense scanning app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Shared base module (UI kit, bootstrap, localization, firebase, ads...)
  dsp_base:
    path: dsp_base

  # Used by firebase_options.dart (real values via `flutterfire configure`)
  firebase_core: ^4.0.0

  # State management & routing
  get: ^4.6.6

  # Responsive sizing (design 360x800, same as dsp_base)
  flutter_screenutil: ^5.9.3

  # SVG / vector icons
  flutter_svg: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App launcher icon & native splash generators (logo: assets/logo/logo.png)
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - lib/xml_strings/values/
    - lib/xml_strings/values-vi/
    - assets/images/
    - assets/logo/

# Generate launcher icons:  dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/logo/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  # Adaptive icon (Android 8+): logo centered on a white background layer.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/logo.png"

# Generate native splash:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/logo/logo.png"
  android_12:
    image: "assets/logo/logo.png"
    color: "#FFFFFF"
  android: true
  ios: true
